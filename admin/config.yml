# ───────────────────────────────────────────────────────────────────
# Panel de edición de contenido — Regencias Radiantes (Decap CMS)
# Generado automáticamente. Para regenerar: scratchpad/gen_config.py
#
# MODO LOCAL (esta máquina): local_backend: true + `npx decap-server`.
#   El cliente entra en http://127.0.0.1:4321/admin/ y edita sin contraseña.
# MODO PRODUCCIÓN (Netlify + DecapBridge): el cliente inicia sesión con
#   correo/contraseña (sin cuenta de GitHub) y cada "Guardar" hace un commit
#   que Netlify reconstruye y publica. Complete los 2 valores marcados ↓
# ───────────────────────────────────────────────────────────────────

# Autenticación DecapBridge (PKCE): el cliente inicia sesión con correo/contraseña.
backend:
  name: git-gateway
  repo: elegutipac/arturo
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/8b17e73d-ad50-43a1-9353-d2ee2597549d/pkce
  auth_token_endpoint: /sites/8b17e73d-ad50-43a1-9353-d2ee2597549d/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Campos que expone DecapBridge en el inicio de sesión PKCE.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://guileless-unicorn-a2a991.netlify.app

# Edición LOCAL en esta máquina con `npx decap-server`. En el sitio publicado
# se ignora automáticamente y se usa el backend DecapBridge de arriba.
local_backend: true

locale: es
media_folder: assets/img
public_folder: assets/img

collections:
  - name: configuracion
    label: Configuración del sitio
    description: Datos de contacto que aparecen en todo el sitio.
